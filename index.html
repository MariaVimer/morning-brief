<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Morning Brief</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      background: #fff;
      color: rgb(55, 53, 47);
      font-size: 14px;
      line-height: 1.6;
    }

    .shell { display: grid; grid-template-columns: 220px 1fr; min-height: 100vh; }

    nav {
      padding: 12px 8px;
      position: sticky;
      top: 0;
      height: 100vh;
      overflow-y: auto;
      border-right: 1px solid rgba(55,53,47,0.09);
    }
    .nav-title { font-size: 13px; font-weight: 600; padding: 6px 8px 2px; }
    .nav-date { font-size: 12px; padding: 2px 8px 12px; color: rgba(55,53,47,0.5); }
    .nav-item {
      display: block; padding: 5px 8px; font-size: 13px;
      color: rgba(55,53,47,0.7); text-decoration: none; cursor: pointer; border-radius: 4px;
    }
    .nav-item:hover { background: rgba(55,53,47,0.06); color: rgb(55,53,47); }
    .nav-item.active { background: rgba(55,53,47,0.08); color: rgb(55,53,47); }
    .nav-group {
      font-size: 11px; font-weight: 600; color: rgba(55,53,47,0.4);
      padding: 14px 8px 4px; text-transform: uppercase; letter-spacing: 0.05em;
    }

    main { padding: 48px 96px; max-width: 900px; }

    .section { display: none; }
    .section.active { display: block; }

    .page-title { font-size: 30px; font-weight: 700; margin-bottom: 4px; }
    .page-subtitle { font-size: 13px; color: rgba(55,53,47,0.5); margin-bottom: 40px; }

    h2 {
      font-size: 13px; font-weight: 600; color: rgba(55,53,47,0.5);
      text-transform: uppercase; letter-spacing: 0.05em; margin: 32px 0 12px;
    }
    h2:first-of-type { margin-top: 0; }

    .headline {
      font-size: 16px; color: rgb(55,53,47); margin-bottom: 40px;
      padding-bottom: 24px; border-bottom: 1px solid rgba(55,53,47,0.09);
    }

    /* Todo items */
    .todo-item {
      display: flex; align-items: flex-start; gap: 6px;
      margin-bottom: 16px; position: relative;
    }
    .item-content { flex: 1; min-width: 0; }
    .todo-task { font-size: 14px; color: rgb(55,53,47); margin-bottom: 2px; }
    .todo-why { font-size: 13px; color: rgba(55,53,47,0.6); }
    .todo-link {
      font-size: 12px; color: rgba(55,53,47,0.4); text-decoration: none; display: inline-block; margin-top: 1px;
    }
    .todo-link:hover { color: rgb(55,53,47); text-decoration: underline; }

    .todo-item.done .todo-task { text-decoration: line-through; color: rgba(55,53,47,0.35); }
    .todo-item.done .todo-why { opacity: 0.4; }

    /* Ellipsis menu */
    .item-menu-wrap { position: relative; flex-shrink: 0; margin-top: 1px; }
    .item-menu-btn {
      opacity: 0; background: none; border: none; cursor: pointer;
      color: rgba(55,53,47,0.45); padding: 1px 5px; border-radius: 3px;
      font-size: 15px; line-height: 1; transition: opacity 0.1s;
    }
    .todo-item:hover .item-menu-btn { opacity: 1; }
    .item-menu-btn:hover { background: rgba(55,53,47,0.08); color: rgb(55,53,47); }

    .dropdown {
      display: none; position: absolute; right: 0; top: 22px; z-index: 200;
      background: #fff; border: 1px solid rgba(55,53,47,0.15);
      border-radius: 6px; box-shadow: 0 4px 16px rgba(0,0,0,0.1);
      min-width: 168px; padding: 4px;
    }
    .dropdown.open { display: block; }
    .dd-item {
      display: block; width: 100%; text-align: left; background: none; border: none;
      padding: 6px 10px; font-size: 13px; color: rgb(55,53,47); cursor: pointer;
      border-radius: 3px; font-family: inherit;
    }
    .dd-item:hover { background: rgba(55,53,47,0.06); }
    .dd-item.danger { color: rgb(220, 80, 80); }

    /* Metrics */
    .metrics-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; margin-bottom: 8px; }
    .metric-label { font-size: 12px; color: rgba(55,53,47,0.5); margin-bottom: 4px; }
    .metric-value { font-size: 22px; font-weight: 600; }
    .metric-note { font-size: 12px; color: rgba(55,53,47,0.5); margin-top: 2px; }

    /* Meetings */
    .meeting-item { margin-bottom: 16px; }
    .meeting-title { font-size: 14px; }
    .meeting-meta { font-size: 12px; color: rgba(55,53,47,0.5); margin-top: 1px; }
    .meeting-prep { font-size: 12px; color: rgba(55,53,47,0.6); margin-top: 3px; }

    /* Flags */
    .flag-item {
      font-size: 13px; color: rgba(55,53,47,0.7);
      margin-bottom: 10px; padding-left: 14px; position: relative;
    }
    .flag-item::before { content: "!"; position: absolute; left: 0; color: rgba(55,53,47,0.35); font-weight: 600; }

    .empty { font-size: 13px; color: rgba(55,53,47,0.4); }

    /* Toast */
    .toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      background: rgb(55,53,47); color: #fff; padding: 8px 16px;
      border-radius: 6px; font-size: 13px; z-index: 999; pointer-events: none;
      animation: fadeup 0.15s ease;
    }
    @keyframes fadeup { from { opacity:0; transform: translateX(-50%) translateY(6px); } to { opacity:1; transform: translateX(-50%) translateY(0); } }
  </style>
</head>
<body>
<div class="shell">
  <nav>
    <div class="nav-title">Morning Brief</div>
    <div class="nav-date" id="nav-date">—</div>
    <div class="nav-group">Today</div>
    <a class="nav-item active" onclick="show('overview', this)">Overview</a>
    <a class="nav-item" onclick="show('todos', this)">To-do</a>
    <a class="nav-item" onclick="show('meetings', this)">Meetings</a>
    <div class="nav-group">Context</div>
    <a class="nav-item" onclick="show('metrics', this)">Metrics</a>
    <a class="nav-item" onclick="show('escalations', this)">Escalations</a>
  </nav>

  <main>
    <div class="section active" id="section-overview">
      <div class="page-title" id="page-title">—</div>
      <div class="page-subtitle" id="page-subtitle">—</div>
      <div class="headline" id="headline"></div>
      <h2>Quick wins</h2>
      <div id="list-quick"><div class="empty">None</div></div>
      <h2>Must close today</h2>
      <div id="list-close"><div class="empty">None</div></div>
      <div id="flags-section" style="display:none">
        <h2>Flags</h2>
        <div id="list-flags"></div>
      </div>
    </div>

    <div class="section" id="section-todos">
      <div class="page-title">To-do</div>
      <div class="page-subtitle" id="todos-date">—</div>
      <h2>Must make progress</h2>
      <div id="list-progress"><div class="empty">None</div></div>
      <h2>Must communicate with</h2>
      <div id="list-comm"><div class="empty">None</div></div>
      <h2>Must report status</h2>
      <div id="list-report"><div class="empty">None</div></div>
    </div>

    <div class="section" id="section-meetings">
      <div class="page-title">Meetings</div>
      <div class="page-subtitle" id="meetings-date">—</div>
      <div id="list-meetings"></div>
    </div>

    <div class="section" id="section-metrics">
      <div class="page-title">Metrics</div>
      <div class="page-subtitle" id="metrics-date">—</div>
      <div class="metrics-grid" id="metrics-grid"></div>
    </div>

    <div class="section" id="section-escalations">
      <div class="page-title">Escalations</div>
      <div class="page-subtitle" id="escalations-date">—</div>
      <div id="list-escalations"></div>
    </div>
  </main>
</div>

<script>
/* BRIEF_DATA_START */
const BRIEF = {
  "date": "2026-03-25",
  "headline": "Clear calendar and quiet comms \u2014 ideal day to make real progress on the generated evaluations (no ground truth) design doc before the next bi-weekly TR.",
  "todos": {
    "quick_wins": [
      {
        "task": "Fix Salesforce and Snowflake integrations so tomorrow's brief has real data",
        "why": "Both connectors are broken; you're flying blind on escalations and product metrics",
        "source": "salesforce",
        "link": ""
      }
    ],
    "must_close_today": [],
    "must_make_progress": [
      {
        "task": "Draft or advance AE-1079: 'Generated evaluations - clarify no ground truth' design doc",
        "why": "Only active ticket on your board; evals is a key 26.4 deliverable called out in the Big Rock TR. Next bi-weekly TR likely April 1 \u2014 get a reviewable draft out before then.",
        "source": "jira",
        "link": "https://uipath.atlassian.net/browse/AE-1079"
      },
      {
        "task": "Review the Big Rock TR page for evals, Flow, and Autopilot updates to align your design doc with current direction",
        "why": "Autopilot is flagged Yellow/Risk and evals adoption is a tracked metric \u2014 your doc should address both",
        "source": "jira",
        "link": "https://uipath.atlassian.net/wiki/spaces/Agents/pages/90404585567"
      }
    ],
    "must_communicate_with": [
      {
        "person_or_team": "Jordan (Templates + Patterns)",
        "about": "Sync on how 'no ground truth' evals interact with DeepRAG and validation patterns he's scoping",
        "channel": "slack",
        "urgency": "this_week"
      },
      {
        "person_or_team": "Dragos / Tomasz (ML/Applied Science)",
        "about": "Get technical input or review commitment on the generated evals approach for AE-1079",
        "channel": "slack",
        "urgency": "this_week"
      },
      {
        "person_or_team": "Zach (Skills doc WIP)",
        "about": "Coordinate on any overlap between skills documentation and eval framework definitions",
        "channel": "slack",
        "urgency": "this_week"
      }
    ],
    "must_report_status": [
      {
        "topic": "AE-1079 generated evaluations design doc progress",
        "to": "Agents leadership (likely Adrian / Marius)",
        "via": "confluence or slack",
        "note": "Have a shareable draft or outline ready before the next bi-weekly TR (~April 1)"
      }
    ]
  },
  "meetings_today": [],
  "metrics_snapshot": {
    "agents_in_production": {
      "value": "unavailable",
      "trend": "unknown",
      "vs_goal": "unavailable \u2014 Snowflake connector broken"
    },
    "evals_adoption": {
      "value": "unavailable",
      "trend": "unknown",
      "vs_goal": "unavailable \u2014 Snowflake connector broken"
    },
    "escalations_open": {
      "value": "unavailable",
      "critical_count": 0
    }
  },
  "flags": [
    "Salesforce integration is down (missing simple_salesforce module) \u2014 no visibility into customer escalations.",
    "Snowflake integration is down (missing connector) \u2014 no product telemetry or funnel metrics available.",
    "Autopilot is flagged Yellow/Risk in the Big Rock TR \u2014 monitor for impact on your evals workstream.",
    "March telemetry data noted as needing update on the TR page \u2014 if you own any of that, get it refreshed before month-end."
  ],
  "slack_summary": "Clear calendar and no inbound fires \u2014 best day to push hard on AE-1079 (generated evaluations, no ground truth design doc), the only active ticket on your board and a key 26.4 deliverable. Second priority: fix the broken Salesforce and Snowflake integrations so you regain visibility on escalations and product metrics. Zero meetings today."
};
/* BRIEF_DATA_END */

/* RAW_DATA_START */
const RAW_DATA = {
  "meetings": [],
  "metrics": {
    "error": "snowflake-connector-python not installed. Run: pip install snowflake-connector-python"
  }
};
/* RAW_DATA_END */

let _uid = 0;
let _openMenu = null;

function show(id, el) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('section-' + id).classList.add('active');
  if (el) el.classList.add('active');
  closeMenu();
}

// ── Menu ──────────────────────────────────────────────────────────────────────

function openMenu(uid, event) {
  event.stopPropagation();
  if (_openMenu === uid) { closeMenu(); return; }
  closeMenu();
  document.getElementById('dd-' + uid).classList.add('open');
  _openMenu = uid;
}

function closeMenu() {
  if (_openMenu !== null) {
    const el = document.getElementById('dd-' + _openMenu);
    if (el) el.classList.remove('open');
    _openMenu = null;
  }
}

document.addEventListener('click', closeMenu);

function markDone(uid) {
  document.getElementById('item-' + uid).classList.toggle('done');
  closeMenu();
}

function moveItem(uid, dir) {
  const el = document.getElementById('item-' + uid);
  const sibling = dir === 'up' ? el.previousElementSibling : el.nextElementSibling;
  if (!sibling) { closeMenu(); return; }
  if (dir === 'up') el.parentNode.insertBefore(el, sibling);
  else el.parentNode.insertBefore(sibling, el);
  closeMenu();
}

function deleteItem(uid) {
  document.getElementById('item-' + uid).remove();
  closeMenu();
}

function shareSlack(uid) {
  const el = document.getElementById('item-' + uid);
  const task = el.querySelector('.todo-task')?.textContent?.trim() || '';
  const why = el.querySelector('.todo-why')?.textContent?.trim() || '';
  const link = el.querySelector('.todo-link')?.href || '';
  const parts = [task, why, link].filter(Boolean);
  navigator.clipboard.writeText(parts.join('\n')).then(() => toast('Copied — paste in Slack'));
  closeMenu();
}

function toast(msg) {
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2200);
}

// ── Render ────────────────────────────────────────────────────────────────────

function todoItem(t) {
  const uid = _uid++;
  const text = t.task || t.topic || t.person_or_team || '';
  const sub  = t.why  || t.about || t.note || '';
  const link = t.link ? `<a class="todo-link" href="${t.link}" target="_blank">${t.link}</a>` : '';
  return `
  <div class="todo-item" id="item-${uid}">
    <div class="item-content">
      <div class="todo-task">${text}</div>
      ${sub  ? `<div class="todo-why">${sub}</div>`  : ''}
      ${link}
    </div>
    <div class="item-menu-wrap">
      <button class="item-menu-btn" onclick="openMenu(${uid}, event)">···</button>
      <div class="dropdown" id="dd-${uid}">
        <button class="dd-item" onclick="markDone(${uid})">Mark as done</button>
        <button class="dd-item" onclick="moveItem(${uid},'up')">Up importance</button>
        <button class="dd-item" onclick="moveItem(${uid},'down')">Down importance</button>
        <button class="dd-item danger" onclick="deleteItem(${uid})">Delete</button>
        <button class="dd-item" onclick="shareSlack(${uid})">Share on Slack</button>
      </div>
    </div>
  </div>`;
}

function metricBlock(label, value, note) {
  return `<div class="metric">
    <div class="metric-label">${label}</div>
    <div class="metric-value">${value || '—'}</div>
    ${note ? `<div class="metric-note">${note}</div>` : ''}
  </div>`;
}

function render() {
  if (!BRIEF || !BRIEF.date) return;
  const d = BRIEF.date;
  ['nav-date','page-subtitle','todos-date','meetings-date','metrics-date','escalations-date']
    .forEach(id => { const el = document.getElementById(id); if (el) el.textContent = d; });
  document.getElementById('page-title').textContent = 'Morning Brief';
  document.getElementById('headline').textContent = BRIEF.headline || '';

  const todos = BRIEF.todos || {};

  const quick = todos.quick_wins || [];
  document.getElementById('list-quick').innerHTML =
    quick.length ? quick.map(todoItem).join('') : '<div class="empty">None</div>';

  const close = todos.must_close_today || [];
  document.getElementById('list-close').innerHTML =
    close.length ? close.map(todoItem).join('') : '<div class="empty">None</div>';

  const progress = todos.must_make_progress || [];
  document.getElementById('list-progress').innerHTML =
    progress.length ? progress.map(todoItem).join('') : '<div class="empty">None</div>';

  const comm = todos.must_communicate_with || [];
  document.getElementById('list-comm').innerHTML =
    comm.length ? comm.map(todoItem).join('') : '<div class="empty">None</div>';

  const report = todos.must_report_status || [];
  document.getElementById('list-report').innerHTML =
    report.length ? report.map(todoItem).join('') : '<div class="empty">None</div>';

  const m = BRIEF.metrics_snapshot || {};
  document.getElementById('metrics-grid').innerHTML = [
    metricBlock('Agents in production', m.agents_in_production?.value, m.agents_in_production?.vs_goal),
    metricBlock('Evals adoption',       m.evals_adoption?.value,       m.evals_adoption?.vs_goal),
    metricBlock('Open escalations',     m.escalations_open?.value,     `${m.escalations_open?.critical_count || 0} critical`),
  ].join('');

  const flags = BRIEF.flags || [];
  if (flags.length) {
    document.getElementById('flags-section').style.display = 'block';
    document.getElementById('list-flags').innerHTML = flags.map(f => `<div class="flag-item">${f}</div>`).join('');
  }

  const meetings = BRIEF.meetings_today || [];
  document.getElementById('list-meetings').innerHTML = meetings.length
    ? meetings.map(m => `<div class="meeting-item">
        <div class="meeting-title">${m.title}</div>
        <div class="meeting-meta">${[m.time, m.duration_min ? m.duration_min+' min' : '', m.attendees_count ? m.attendees_count+' people' : ''].filter(Boolean).join(' · ')}</div>
        ${m.prep_note ? `<div class="meeting-prep">${m.prep_note}</div>` : ''}
      </div>`).join('')
    : '<div class="empty">No meetings today</div>';

  const escs = (RAW_DATA.escalations || {}).open_escalations || [];
  document.getElementById('list-escalations').innerHTML = escs.length
    ? escs.map(e => `<div class="todo-item">
        <div class="item-content">
          <div class="todo-task">${e.subject}</div>
          <div class="todo-why">${[e.account, e.priority, e.status].filter(Boolean).join(' · ')}</div>
          ${e.url ? `<a class="todo-link" href="${e.url}" target="_blank">${e.case_number}</a>` : ''}
        </div>
      </div>`).join('')
    : '<div class="empty">No open escalations</div>';
}

render();
</script>
</body>
</html>
